<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Дубрава · Директ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#1A1514; --surface:#211C1B; --surface2:#2A2422; --line:#3A2F2C;
  --accent:#3A86FF; --warm:#F4A259;
  --text:#F2EDE9; --muted:#9C9089;
  --green:#4CAF7D; --amber:#E8B04B; --red:#E2603F;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:Montserrat,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:32px 24px 64px;max-width:1180px;margin:0 auto}

.head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:28px}
.head h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.head h1 span{color:var(--accent)}
.tagline{font-family:Caveat,cursive;font-size:21px;color:var(--muted);margin-top:2px}
.period{font-size:13px;color:var(--muted);text-align:right;line-height:1.6}
.period b{color:var(--text);font-weight:600}
.period .upd{color:var(--green);font-weight:500}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);
  padding:8px 16px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:.15s}
.chip:hover{color:var(--text);border-color:#52443f}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 16px 18px}
.kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
.kpi .val{font-size:24px;font-weight:700;margin-top:8px;letter-spacing:-.02em}
.kpi .val small{font-size:13px;font-weight:500;color:var(--muted);margin-left:3px}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:24px}
.panel-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.panel-head h2{font-size:15px;font-weight:600}
.panel-head h2 .cnt{color:var(--muted);font-weight:500;margin-left:6px}
.seg{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:4px;flex-wrap:wrap}
.seg button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;
  padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button:hover{color:var(--text)}
.seg button.on{background:var(--surface2);color:var(--text)}
.chart-wrap{height:320px;position:relative}

.alerts{display:flex;flex-direction:column;gap:8px}
.alert{display:flex;gap:12px;align-items:flex-start;background:var(--bg);border:1px solid var(--line);
  border-left-width:3px;border-radius:10px;padding:12px 14px}
.alert.red{border-left-color:var(--red)} .alert.amber{border-left-color:var(--amber)}
.alert.info{border-left-color:var(--accent)} .alert.ok{border-left-color:var(--green)}
.alert .ico{font-size:15px;line-height:1.4;flex-shrink:0}
.alert .body{font-size:13px;line-height:1.5}
.alert .body .t{font-weight:600}
.alert .body .d{color:var(--muted);margin-top:2px}
.alert .meta{margin-left:auto;text-align:right;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.alert .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

.cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:720px){.cmp{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}}
.cmp .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;border-left:3px solid var(--accent)}
.cmp .card .nm{font-size:14px;font-weight:600;margin-bottom:14px}
.cmp .row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line)}
.cmp .row:last-child{border-bottom:none}
.cmp .row span{color:var(--muted)}
.cmp .row b{font-weight:600}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.06em;position:sticky;top:0;background:var(--surface)}
td:first-child,th:first-child{text-align:left}
.tag{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.cpa-g{color:var(--green)} .cpa-a{color:var(--amber)} .cpa-r{color:var(--red);font-weight:600}
.tbl-scroll{max-height:420px;overflow:auto;border-radius:10px}

.note{font-size:12px;color:var(--muted);line-height:1.6;border-left:2px solid var(--warm);padding-left:12px;margin-top:6px}
.foot{font-size:11.5px;color:var(--muted);text-align:center;margin-top:32px;line-height:1.6}
.state{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:40px;text-align:center;color:var(--muted);font-size:14px;line-height:1.6}
</style>
</head>
<body>

<div class="head">
  <div>
    <h1>Дубрава <span>·</span> Директ</h1>
    <div class="tagline">сложное внутри, простое снаружи</div>
  </div>
  <div class="period">Период<br><b id="periodLabel">—</b><br><span class="upd" id="updLabel"></span></div>
</div>

<div id="app">
  <div class="state" id="loadState">Загрузка данных…</div>
</div>

<div class="foot">
  Данные тянутся из API Директа за последние 90 дней и обновляются по расписанию.<br>
  Конверсии «Летних будней» — это в основном клик по кнопке брони TravelLine, а не завершённая бронь, поэтому их CPA так низок.
</div>

<script>
let DATA=[], CAMPS=[], COLORS={}, UPDATED="";
let curCamp="all", curMetric="cost";
let base={}, lastDate="";
const PALETTE=["#3A86FF","#F4A259","#4CAF7D","#B57BFF","#E8B04B","#E2603F","#5BC0EB"];
const METRICS=[["cost","Расход"],["conv","Конверсии"],["cpa","CPA"],["clicks","Клики"],["shows","Показы"],["cr","CR"]];

const fmtInt=n=>Math.round(n).toLocaleString("ru-RU");
const fmtMoney=n=>n.toLocaleString("ru-RU",{maximumFractionDigits:0});
const fmt2=n=>n.toLocaleString("ru-RU",{minimumFractionDigits:2,maximumFractionDigits:2});
const rowsFor=c=>c==="all"?DATA:DATA.filter(r=>r.c===c);
const dates=()=>[...new Set(DATA.map(r=>r.d))];
const median=a=>{a=a.slice().sort((x,y)=>x-y);return a.length?a[Math.floor(a.length/2)]:null};

function deriveMeta(){
  const cost={};
  DATA.forEach(r=>{cost[r.c]=(cost[r.c]||0)+r.cost});
  CAMPS=Object.keys(cost).sort((a,b)=>cost[b]-cost[a]);
  COLORS={}; CAMPS.forEach((c,i)=>COLORS[c]=PALETTE[i%PALETTE.length]);
}
function recomputeBase(){
  base={};
  CAMPS.forEach(c=>{
    const rs=DATA.filter(r=>r.c===c);
    base[c]={
      cpa:median(rs.filter(r=>r.cpa!=null).map(r=>r.cpa)),
      cost:median(rs.map(r=>r.cost)),
      cr:median(rs.filter(r=>r.cr!=null).map(r=>r.cr)),
      shows:median(rs.map(r=>r.shows)),
    };
  });
  lastDate=dates().slice(-1)[0];
}
const isPartial=r=> r.d===lastDate && base[r.c] && base[r.c].shows && r.shows < 0.4*base[r.c].shows;

function buildAlerts(camp){
  const rs=(camp==="all"?DATA:DATA.filter(r=>r.c===camp));
  const al=[];
  rs.forEach(r=>{
    const b=base[r.c]; if(!b)return;
    if(isPartial(r)){al.push({d:r.d,c:r.c,sev:"info",t:"День ещё неполный",
      det:`Данные за ${r.d.slice(0,5)} ещё докручиваются, цифры подрастут.`});return;}
    if(r.cpa!=null&&b.cpa){const k=r.cpa/b.cpa;
      if(k>1.5)al.push({d:r.d,c:r.c,sev:"red",t:`CPA ${fmt2(r.cpa)} ₽`,det:`В ${fmt2(k)}× дороже обычного дня (медиана ${fmt2(b.cpa)} ₽).`});
      else if(k>1.2)al.push({d:r.d,c:r.c,sev:"amber",t:`CPA ${fmt2(r.cpa)} ₽`,det:`Выше нормы (медиана ${fmt2(b.cpa)} ₽).`});}
    if(r.conv===0&&b.cost&&r.cost>0.3*b.cost)al.push({d:r.d,c:r.c,sev:"red",t:"День без конверсий",det:`Потрачено ${fmt2(r.cost)} ₽, ноль конверсий.`});
    if(b.cost&&r.cost>1.8*b.cost)al.push({d:r.d,c:r.c,sev:"amber",t:`Скачок расхода ${fmtMoney(r.cost)} ₽`,det:`Заметно выше обычного дня (медиана ${fmtMoney(b.cost)} ₽).`});
    if(r.cr!=null&&b.cr&&r.clicks>10&&r.cr<0.5*b.cr)al.push({d:r.d,c:r.c,sev:"amber",t:`CR просел до ${fmt2(r.cr)}%`,det:`Почти вдвое ниже обычного (медиана ${fmt2(b.cr)}%).`});
  });
  const ord={red:0,amber:1,info:2,ok:3};
  al.sort((a,b)=> a.d<b.d?1:a.d>b.d?-1: ord[a.sev]-ord[b.sev]);
  return al.slice(0,9);
}

function buildLayout(){
  document.getElementById("app").innerHTML=`
    <div class="filters" id="filters"></div>
    <div class="kpis" id="kpis"></div>
    <div class="panel"><div class="panel-head"><h2>Тревоги <span class="cnt" id="alertCnt"></span></h2></div><div class="alerts" id="alerts"></div></div>
    <div class="panel"><div class="panel-head"><h2>По дням</h2><div class="seg" id="metricSeg"></div></div><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
    <div class="cmp" id="cmp"></div>
    <div class="panel"><div class="panel-head"><h2>Дневная таблица</h2></div>
      <div class="tbl-scroll"><table><thead><tr>
        <th>Кампания</th><th>День</th><th>Показы</th><th>Клики</th><th>Расход ₽</th><th>Конв.</th><th>CR %</th><th>CPA ₽</th>
      </tr></thead><tbody id="tbody"></tbody></table></div>
      <div class="note">CPA подсвечивается относительно медианы своей кампании: красным — заметно дороже обычного дня, зелёным — дешевле.</div>
    </div>`;
}

function buildFilters(){
  const f=document.getElementById("filters");
  const opts=[["all","Все кампании"],...CAMPS.map(c=>[c,c])];
  f.innerHTML="";
  opts.forEach(([val,label])=>{
    const b=document.createElement("button");
    b.className="chip"+(val===curCamp?" on":"");b.textContent=label;
    b.onclick=()=>{curCamp=val;[...f.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");renderAll()};
    f.appendChild(b);
  });
}
function buildSeg(){
  const s=document.getElementById("metricSeg");s.innerHTML="";
  METRICS.forEach(([key,label])=>{
    const b=document.createElement("button");
    b.className=key===curMetric?"on":"";b.textContent=label;
    b.onclick=()=>{curMetric=key;[...s.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");renderChart()};
    s.appendChild(b);
  });
}

function renderKpis(){
  const rs=rowsFor(curCamp);const sum=k=>rs.reduce((a,r)=>a+(r[k]||0),0);
  const shows=sum("shows"),clicks=sum("clicks"),cost=sum("cost"),conv=sum("conv");
  const cpa=conv?cost/conv:null,cr=clicks?conv/clicks*100:null;
  const cards=[["Расход",fmtMoney(cost),"₽"],["Клики",fmtInt(clicks),""],["Конверсии",fmtInt(conv),""],
    ["CPA",cpa==null?"—":fmt2(cpa),"₽"],["CR",cr==null?"—":fmt2(cr),"%"],["Показы",fmtInt(shows),""]];
  document.getElementById("kpis").innerHTML=cards.map(([l,v,u])=>
    `<div class="kpi"><div class="lab">${l}</div><div class="val">${v}${u?`<small>${u}</small>`:""}</div></div>`).join("");
}

function renderAlerts(){
  const al=buildAlerts(curCamp);const box=document.getElementById("alerts");
  const reds=al.filter(a=>a.sev==="red").length;
  document.getElementById("alertCnt").textContent=al.length?`(${al.length}${reds?", "+reds+" срочно":""})`:"";
  const ICO={red:"●",amber:"●",info:"○",ok:"✓"};
  if(!al.length){box.innerHTML=`<div class="alert ok"><span class="ico" style="color:var(--green)">✓</span><div class="body"><div class="t">Всё спокойно</div><div class="d">Аномалий за период не нашлось.</div></div></div>`;return}
  box.innerHTML=al.map(a=>{
    const col=a.sev==="red"?"var(--red)":a.sev==="amber"?"var(--amber)":"var(--accent)";
    return `<div class="alert ${a.sev}"><span class="ico" style="color:${col}">${ICO[a.sev]}</span>
      <div class="body"><div class="t">${a.t}</div><div class="d">${a.det}</div></div>
      <div class="meta"><span class="dot" style="background:${COLORS[a.c]}"></span>${a.c}<br>${a.d.slice(0,5)}</div></div>`;
  }).join("");
}

let chart;
function renderChart(){
  const ds=dates();const mLabel=METRICS.find(m=>m[0]===curMetric)[1];
  const camps=curCamp==="all"?CAMPS:[curCamp];const series=[];
  camps.forEach(c=>{
    const byDate={};DATA.filter(r=>r.c===c).forEach(r=>byDate[r.d]=r[curMetric]);
    series.push({label:c,data:ds.map(d=>byDate[d]??null),borderColor:COLORS[c],
      backgroundColor:COLORS[c]+"22",borderWidth:2,tension:.3,pointRadius:1.5,pointHoverRadius:5,spanGaps:true,fill:camps.length===1});
  });
  const cfg={type:"line",data:{labels:ds.map(d=>d.slice(0,5)),datasets:series},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:curCamp==="all",labels:{color:"#9C9089",usePointStyle:true,boxWidth:8,font:{family:"Montserrat",size:12}}},
        tooltip:{backgroundColor:"#2A2422",borderColor:"#3A2F2C",borderWidth:1,titleColor:"#F2EDE9",bodyColor:"#F2EDE9",padding:10,
          callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y==null?"—":ctx.parsed.y.toLocaleString("ru-RU",{maximumFractionDigits:2})}`}}},
      scales:{x:{grid:{color:"#2A2422"},ticks:{color:"#9C9089",font:{family:"Montserrat",size:11},maxRotation:0,autoSkip:true,maxTicksLimit:14}},
        y:{grid:{color:"#2A2422"},ticks:{color:"#9C9089",font:{family:"Montserrat",size:11}},title:{display:true,text:mLabel,color:"#9C9089",font:{family:"Montserrat",size:11}}}}}};
  if(chart)chart.destroy();chart=new Chart(document.getElementById("chart"),cfg);
}

function renderCmp(){
  const totalCost=DATA.reduce((a,r)=>a+r.cost,0)||1;
  document.getElementById("cmp").innerHTML=CAMPS.slice(0,4).map(c=>{
    const rs=DATA.filter(r=>r.c===c);const sum=k=>rs.reduce((a,r)=>a+(r[k]||0),0);
    const cost=sum("cost"),conv=sum("conv"),clicks=sum("clicks");
    const cpa=conv?cost/conv:null,cr=clicks?conv/clicks*100:null,share=cost/totalCost*100;
    return `<div class="card" style="border-left-color:${COLORS[c]}"><div class="nm">${c}</div>
      <div class="row"><span>Расход</span><b>${fmtMoney(cost)} ₽ <span style="color:var(--muted)">(${fmt2(share)}%)</span></b></div>
      <div class="row"><span>Конверсии</span><b>${fmtInt(conv)}</b></div>
      <div class="row"><span>CPA</span><b>${cpa==null?"—":fmt2(cpa)+" ₽"}</b></div>
      <div class="row"><span>CR</span><b>${cr==null?"—":fmt2(cr)+"%"}</b></div></div>`;
  }).join("");
}

function cpaClass(r){if(r.cpa==null||!base[r.c]||!base[r.c].cpa)return"";const k=r.cpa/base[r.c].cpa;
  if(k>1.5)return"cpa-r";if(k>1.15)return"cpa-a";if(k<0.85)return"cpa-g";return""}
function renderTable(){
  const rs=rowsFor(curCamp).slice().reverse();
  document.getElementById("tbody").innerHTML=rs.map(r=>
    `<tr><td><span class="tag" style="background:${COLORS[r.c]}"></span>${r.c}</td><td>${r.d.slice(0,5)}</td>
      <td>${fmtInt(r.shows)}</td><td>${fmtInt(r.clicks)}</td><td>${fmt2(r.cost)}</td>
      <td>${fmtInt(r.conv)}</td><td>${r.cr==null?"—":fmt2(r.cr)}</td>
      <td class="${cpaClass(r)}">${r.cpa==null?"—":fmt2(r.cpa)}</td></tr>`).join("");
}

function setPeriod(){
  const ds=dates();
  document.getElementById("periodLabel").textContent=ds.length?ds[0]+" — "+ds[ds.length-1]:"—";
  document.getElementById("updLabel").textContent=UPDATED?"обновлено "+UPDATED:"";
}
function renderAll(){renderKpis();renderAlerts();renderChart();renderTable()}

async function init(){
  try{
    const res=await fetch("data.json?_="+Date.now());
    if(!res.ok)throw new Error("HTTP "+res.status);
    const payload=await res.json();
    DATA=payload.rows||[];UPDATED=payload.updated||"";
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="state">Не удалось загрузить данные (${e}).<br>Если открываешь файл локально двойным кликом — так не сработает, data.json грузится только с сайта на GitHub Pages.</div>`;
    return;
  }
  if(!DATA.length){document.getElementById("app").innerHTML=`<div class="state">Данных пока нет. Дождись первого запуска обновления.</div>`;return;}
  deriveMeta();recomputeBase();
  buildLayout();setPeriod();buildFilters();buildSeg();renderCmp();renderAll();
}
init();
</script>
</body>
</html>
